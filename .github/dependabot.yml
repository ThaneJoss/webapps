version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      frontend-toolchain:
        patterns:
          - "vite*"
          - "vitest*"
          - "vue*"
          - "@vitejs/*"
          - "@vue/*"
          - "@unocss/*"
          - "unocss"
    commit-message:
      prefix: "chore"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Shanghai
    commit-message:
      prefix: "chore"
      include: scope
