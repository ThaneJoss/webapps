<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>页面未找到 | Thane Joss</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: #0a1628;
        background:
          radial-gradient(circle at top left, rgba(82, 215, 255, 0.2), transparent 28%),
          radial-gradient(circle at top right, rgba(93, 148, 255, 0.18), transparent 30%),
          radial-gradient(circle at 20% 90%, rgba(116, 231, 200, 0.16), transparent 30%),
          linear-gradient(180deg, #edf4ff 0%, #f6fbff 32%, #eef4ff 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: "";
        pointer-events: none;
        position: fixed;
        inset: 0;
        opacity: 0.52;
        background-image:
          linear-gradient(rgba(92, 121, 160, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(92, 121, 160, 0.08) 1px, transparent 1px);
        background-size: 96px 96px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.7), transparent 92%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      .header,
      .section {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding-inline: 1.5rem;
      }

      .header {
        padding-top: 0.75rem;
      }

      .bar,
      .card {
        border: 1px solid rgba(92, 121, 160, 0.18);
        border-radius: 1.5rem;
        background: rgba(248, 251, 255, 0.92);
        box-shadow: 0 22px 64px rgba(10, 22, 40, 0.12), 0 0 0 1px rgba(93, 148, 255, 0.04);
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1rem;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        font-weight: 700;
      }

      .mark {
        display: grid;
        width: 2.65rem;
        height: 2.65rem;
        place-items: center;
        border: 1px solid rgba(23, 48, 75, 0.12);
        border-radius: 1rem;
        background:
          linear-gradient(180deg, rgba(235, 245, 255, 0.98), rgba(221, 236, 255, 0.92)),
          radial-gradient(circle at top, rgba(82, 215, 255, 0.16), transparent 60%);
        color: #123a63;
      }

      .nav {
        display: flex;
        gap: 0.5rem;
      }

      .nav a,
      .secondary {
        border: 1px solid rgba(23, 48, 75, 0.14);
        border-radius: 999px;
        padding: 0.65rem 0.95rem;
        font-size: 0.9rem;
      }

      main {
        display: flex;
        flex: 1;
        align-items: center;
        padding-block: 2rem;
      }

      .card {
        position: relative;
        overflow: hidden;
        display: grid;
        width: 100%;
        gap: 2rem;
        padding: 2rem 1.5rem;
      }

      .card::after {
        content: "404";
        position: absolute;
        right: 1rem;
        bottom: -0.12em;
        color: rgba(18, 58, 99, 0.06);
        font-size: 8rem;
        font-weight: 800;
        line-height: 0.8;
      }

      .content {
        position: relative;
        z-index: 1;
        max-width: 46rem;
      }

      .label {
        margin: 0;
        color: #5a6e87;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 12ch;
        margin: 1rem 0 0;
        color: #0a1628;
        font-size: 2.8rem;
        font-weight: 650;
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 1.5rem 0 0;
        max-width: 38rem;
        color: #5a6e87;
        font-size: 1.05rem;
        line-height: 1.8;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 2rem;
      }

      .primary {
        border: 1px solid rgba(102, 228, 255, 0.26);
        border-radius: 999px;
        padding: 0.85rem 1.4rem;
        color: #f8fbff;
        background:
          linear-gradient(135deg, rgba(8, 18, 34, 0.98), rgba(17, 45, 86, 0.95) 48%, rgba(17, 102, 117, 0.92)),
          linear-gradient(135deg, rgba(82, 215, 255, 0.2), rgba(116, 231, 200, 0.14), rgba(255, 141, 107, 0.14));
        box-shadow: 0 16px 36px rgba(10, 22, 40, 0.18);
      }

      .secondary {
        background: rgba(248, 251, 255, 0.72);
      }

      @media (min-width: 640px) {
        .header,
        .section {
          padding-inline: 2rem;
        }

        .card {
          padding: 3rem 3.5rem;
        }

        .card::after {
          right: 2.25rem;
          font-size: 12rem;
        }

        h1 {
          font-size: 4rem;
        }
      }

      @media (min-width: 1024px) {
        .card::after {
          right: 5rem;
          font-size: 18rem;
        }

        h1 {
          font-size: 4.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="header">
        <div class="bar">
          <a class="brand" href="/" aria-label="返回首页">
            <span class="mark">TJ</span>
            <span>Thane Joss</span>
          </a>
          <nav class="nav" aria-label="主要导航">
            <a href="/">首页</a>
            <a href="/contact">联系</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="section">
          <div class="card">
            <div class="content">
              <p class="label">404 Not Found</p>
              <h1>这个页面还没有上线</h1>
              <p>你访问的入口暂时不存在，可能是工具还在规划中，也可能是链接已经变更。</p>
              <div class="actions">
                <a class="primary" href="/">返回首页</a>
                <a class="secondary" href="/contact">联系我</a>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
